global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'rule_id']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        alertname: RuleFPRateHigh
      receiver: 'scoring-engine-webhook'
      continue: false

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:9093/api/v1/alerts'  # no-op default

  - name: 'scoring-engine-webhook'
    webhook_configs:
      - url: 'http://scoring-management:8090/rules/{{ .GroupLabels.rule_id }}/demote'
        send_resolved: false
        http_config:
          follow_redirects: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'rule_id']
