services:
  broker:
    image: confluentinc/cp-kafka:7.9.6
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://broker:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.6
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 10s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  flink-jobmanager:
    image: ${FLINK_IMAGE:-apache/flink:1.20.3-scala_2.12}
    platform: linux/amd64
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    command: jobmanager
    ports:
      - "8082:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./geoip:/opt/flink/geoip:ro
    depends_on:
      broker:
        condition: service_healthy
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 10s
      retries: 10

  flink-taskmanager:
    image: ${FLINK_IMAGE:-apache/flink:1.20.3-scala_2.12}
    platform: linux/amd64
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./geoip:/opt/flink/geoip:ro
    depends_on:
      - flink-jobmanager
    networks: [fraudstream]

  # TECH DEBT: producer-api and load-generator are built and published via CI
  # (see .github/workflows/ci.yml build-images job) but not wired into compose
  # for local dev because pip's source compilation of confluent-kafka/grpcio
  # makes the build prohibitively slow on some platforms.
  # To revisit: pin prebuilt wheels in a requirements.txt lock file, or use
  # a pre-published GHCR image via PRODUCER_IMAGE / LOAD_GEN_IMAGE env vars.

  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: minio
    hostname: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fraudstream
      POSTGRES_USER: fraudstream
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraudstream}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/migrations/001_create_fraud_alerts.sql:/docker-entrypoint-initdb.d/001_create_fraud_alerts.sql:ro
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "fraudstream", "-d", "fraudstream"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fraudstream-redis
    command: redis-server --save 60 1 --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - fraudstream_redis_data:/data
    networks: [fraudstream]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scoring-management:
    image: python:3.11-slim
    container_name: fraudstream-scoring-management
    command: >
      sh -c "pip install fastapi uvicorn pydantic pybreaker prometheus-client pyyaml redis slowapi --quiet &&
             uvicorn pipelines.scoring.management_api:app --host 0.0.0.0 --port 8090"
    volumes:
      - ../:/app
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - KAFKA_BOOTSTRAP_SERVERS=broker:29092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - REDIS_URL=redis://redis:6379/0
      - RULES_YAML_PATH=/app/rules/rules.yaml
      - MANAGEMENT_API_KEY=${MANAGEMENT_API_KEY:-}
      - FRAUD_ALERTS_DB_URL=${FRAUD_ALERTS_DB_URL:-postgresql://fraudstream:fraudstream@postgres:5432/fraudstream}
    networks: [fraudstream]
    depends_on:
      redis:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.32.0
    container_name: fraudstream-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
    networks: [fraudstream]
    depends_on:
      - prometheus

volumes:
  grafana-data:
  minio-data:
  postgres-data:
  fraudstream_redis_data:

networks:
  fraudstream:
    driver: bridge
