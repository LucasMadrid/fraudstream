# Default fraud detection rule set for feature 003 (fraud-rule-engine)
# Loaded by RuleLoader at job startup.
# All threshold values are configurable here without requiring code changes.

- rule_id: "VEL-001"
  name: "HIGH_FREQUENCY_1M"
  family: "velocity"
  severity: "high"
  enabled: true
  conditions:
    field: "vel_count_1m"
    count: 5

- rule_id: "VEL-002"
  name: "HIGH_AMOUNT_5M"
  family: "velocity"
  severity: "high"
  enabled: true
  conditions:
    field: "vel_amount_5m"
    amount: 2000.00

- rule_id: "VEL-003"
  name: "BURST_COUNT_5M"
  family: "velocity"
  severity: "medium"
  enabled: true
  conditions:
    field: "vel_count_5m"
    count: 10

- rule_id: "VEL-004"
  name: "DAILY_AMOUNT_SPIKE"
  family: "velocity"
  severity: "medium"
  enabled: true
  conditions:
    field: "vel_amount_24h"
    amount: 10000.00

# CROSS-FEATURE DEPENDENCY: IT-001 and IT-002 require prev_geo_country + prev_txn_time_ms
# from feature 002 DeviceProfileState. These fields are absent from enriched-txn-v1.avsc.
# Rules load and metrics count, but evaluate to not-met until feature 002 ships these fields.
- rule_id: "IT-001"
  name: "IMPOSSIBLE_TRAVEL"
  family: "impossible_travel"
  severity: "critical"
  enabled: true
  conditions:
    window_ms: 3600000

- rule_id: "IT-002"
  name: "CROSS_BORDER_VELOCITY"
  family: "impossible_travel"
  severity: "high"
  enabled: true
  conditions:
    count: 3

- rule_id: "ND-001"
  name: "NEW_DEVICE_HIGH_AMOUNT"
  family: "new_device"
  severity: "high"
  enabled: true
  conditions:
    amount: 500.00

- rule_id: "ND-002"
  name: "NEW_DEVICE_RAPID_TXN"
  family: "new_device"
  severity: "medium"
  enabled: true
  conditions:
    device_count: 3
    vel_count: 5

# ND-003: device_known_fraud is always null in enriched-txn-v1.avsc (NOT YET WIRED IN V1)
- rule_id: "ND-003"
  name: "KNOWN_FRAUD_DEVICE"
  family: "new_device"
  severity: "critical"
  enabled: true
  conditions: {}

- rule_id: "ND-004"
  name: "NEW_DEVICE_FOREIGN"
  family: "new_device"
  severity: "high"
  enabled: true
  conditions:
    network_class: "HOSTING"
